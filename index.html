<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="keywords" content="Caleb Kan" />
    <meta name="description" content="Caleb Kan's personal website" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0b0b0b" />
    <meta property="og:title" content="Caleb Kan" />
    <meta property="og:description" content="Caleb Kan's personal website" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.calebkan.com/" />
    <meta
      property="og:image"
      content="https://www.calebkan.com/favicon/favicon.png"
    />
    <meta property="og:image:width" content="180" />
    <meta property="og:image:height" content="180" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Caleb Kan" />
    <meta name="twitter:description" content="Caleb Kan's personal website" />
    <meta
      name="twitter:image"
      content="https://www.calebkan.com/favicon/favicon.png"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com; img-src 'self' data: https://i.scdn.co; connect-src 'self'"
    />

    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://i.scdn.co" />

    <script src="./js/theme-boot.js"></script>

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
      integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="jemdoc.css" type="text/css" />

    <link
      rel="icon"
      href="./favicon/favicon.png"
      type="image/png"
      sizes="180x180"
    />
    <link rel="apple-touch-icon" href="./favicon/favicon.png" />
    <link rel="canonical" href="https://www.calebkan.com/" />

    <title>Caleb Kan</title>
  </head>

  <body>
    <div id="cards-wrapper">
      <main class="card-main" aria-labelledby="page-title">
        <!-- Theme toggle button -->
        <button
          class="theme-toggle"
          type="button"
          aria-label="Switch to light mode"
          aria-pressed="true"
          title="Switch to light mode"
        >
          <i class="fa-solid fa-sun icon sun" aria-hidden="true"></i>
          <i class="fa-solid fa-moon icon moon" aria-hidden="true"></i>
          <span class="thumb" aria-hidden="true"></span>
        </button>

        <div class="card-inner">
          <h1 id="page-title" tabindex="-1">Caleb Kan</h1>
          <p>
            <strong>email</strong>
            <a
              href="mailto:hello@calebkan.com"
              aria-label="Email hello@calebkan.com"
              >hello@calebkan.com</a
            >
          </p>
          <p>
            <strong>phone</strong>
            <a href="tel:+447828210751" aria-label="Call +44 7828210751"
              >+44&nbsp;7828210751</a
            >
          </p>
          <div class="social-links">
            <a
              href="https://github.com/caleb-kan"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="GitHub"
              title="GitHub"
            >
              <i class="fa-brands fa-github" aria-hidden="true"></i>
            </a>
            <a
              href="https://www.linkedin.com/in/caleb-kan"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="LinkedIn"
              title="LinkedIn"
            >
              <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
            </a>
          </div>
          <div id="github-calendar" aria-live="polite">
            Loading contributions...
          </div>
        </div>
      </main>

      <section
        id="spotify-card"
        class="card-spotify"
        aria-label="Currently playing on Spotify"
        hidden
      >
        <div class="spotify-header">
          <i class="fa-brands fa-spotify" aria-hidden="true"></i>
          <span>Now Playing</span>
        </div>
        <div class="spotify-content">
          <img
            id="spotify-album-art"
            src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
            alt="Album art"
            width="160"
            height="160"
            class="spotify-album-art"
          />
          <div class="spotify-info">
            <a id="spotify-title" class="spotify-title"></a>
            <p id="spotify-artist" class="spotify-artist"></p>
          </div>
        </div>
        <div class="spotify-progress-container">
          <div
            id="spotify-progress"
            class="spotify-progress"
            role="progressbar"
            aria-label="Song progress"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          ></div>
        </div>
      </section>
    </div>

    <script defer src="./js/theme-toggle.js"></script>
    <script defer src="./js/github-calendar.js"></script>
    <script defer src="./js/spotify.js"></script>
  </body>
</html>
